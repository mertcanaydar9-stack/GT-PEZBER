<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GTİP Ezber</title>
<meta name="description" content="GTİP tarife pozisyonlarını kolayca ezberleyin">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GTİP Ezber">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --gold: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #e8eaf0;
    --text-muted: #6b7a99;
    --border: #1f2d45;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 20px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-num.correct { color: var(--green); }
  .stat-num.wrong { color: var(--red); }
  .stat-num.streak { color: var(--gold); }
  .stat-num.total { color: var(--accent); }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Mode selector */
  .mode-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    gap: 4px;
  }

  .mode-tab {
    flex: 1;
    padding: 9px 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-tab.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* Card area */
  .card-area {
    min-height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }

  /* Flashcard */
  .flashcard-wrap {
    width: 100%;
    perspective: 1000px;
  }

  .flashcard {
    width: 100%;
    min-height: 260px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }

  .flashcard.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    min-height: 260px;
    backface-visibility: hidden;
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid var(--border);
  }

  .card-front {
    background: var(--surface);
  }

  .card-back {
    background: linear-gradient(135deg, #0d1f35 0%, #0a1628 100%);
    border-color: var(--accent);
    transform: rotateY(180deg);
  }

  .card-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .tag-code {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
  }

  .tag-desc {
    background: rgba(255,107,53,0.1);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.2);
  }

  .card-code {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .card-chapter {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .card-description {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
  }

  .card-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flip-icon {
    width: 16px;
    height: 16px;
    opacity: 0.5;
  }

  /* Feedback overlay */
  .feedback-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 10;
  }

  .feedback-overlay.show { opacity: 1; }
  .feedback-overlay.correct-feedback { background: rgba(6,214,160,0.15); }
  .feedback-overlay.wrong-feedback { background: rgba(239,71,111,0.15); }

  /* Question card */
  .question-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
  }

  .q-type-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
    background: rgba(255,209,102,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,209,102,0.2);
    font-family: 'Space Mono', monospace;
  }

  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 20px;
    color: var(--text);
  }

  .q-code-display {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .option-btn.correct-ans {
    border-color: var(--green);
    background: rgba(6,214,160,0.1);
    color: var(--green);
  }

  .option-btn.wrong-ans {
    border-color: var(--red);
    background: rgba(239,71,111,0.1);
    color: var(--red);
  }

  .option-letter {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* True/False */
  .tf-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }

  .tf-btn {
    padding: 20px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tf-btn.true-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: rgba(6,214,160,0.1);
    color: var(--green);
  }

  .tf-btn.false-btn:hover:not(:disabled) {
    border-color: var(--red);
    background: rgba(239,71,111,0.1);
    color: var(--red);
  }

  .tf-btn.correct-ans {
    border-color: var(--green);
    background: rgba(6,214,160,0.1);
    color: var(--green);
  }

  .tf-btn.wrong-ans {
    border-color: var(--red);
    background: rgba(239,71,111,0.1);
    color: var(--red);
  }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .btn-primary {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    padding: 14px 18px;
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  /* Self rate buttons for flashcard */
  .self-rate {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 4px;
  }

  .rate-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .rate-btn.knew {
    background: rgba(6,214,160,0.15);
    color: var(--green);
    border: 1.5px solid var(--green);
  }

  .rate-btn.didnt {
    background: rgba(239,71,111,0.15);
    color: var(--red);
    border: 1.5px solid var(--red);
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 8px;
    transition: width 0.4s ease;
  }

  /* Result screen */
  .result-screen {
    text-align: center;
    padding: 32px 20px;
  }

  .result-emoji {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .result-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .result-score {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
    margin: 16px 0;
  }

  .result-detail {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* Category filter */
  .filter-wrap {
    margin-bottom: 16px;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .filter-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-chip {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .filter-chip.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .hidden { display: none !important; }

  /* Explanation box */
  .explanation-box {
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    display: none;
  }

  .explanation-box.show { display: block; }

  .progress-text {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* Sidebar toggle button */
  .sidebar-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .sidebar-toggle span { flex: 1; text-align: left; }

  /* Overlay */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.open { display: block; }

  /* Sidebar drawer */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 280px;
    background: #0d1525;
    border-right: 1px solid var(--border);
    z-index: 101;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .sidebar-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .sidebar-close:hover { background: var(--surface2); color: var(--text); }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    gap: 10px;
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active {
    border-left-color: var(--accent);
    background: rgba(0,229,255,0.06);
  }

  .sidebar-item-name {
    font-size: 14px;
    color: var(--text-muted);
    flex: 1;
    line-height: 1.3;
  }
  .sidebar-item.active .sidebar-item-name { color: var(--accent); font-weight: 500; }

  .sidebar-item-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .sidebar-item.active .sidebar-item-count {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
  }


  .sidebar-all {
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .sidebar-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar-section-header:hover { background: var(--surface2); }
  .sidebar-section-header.active {
    border-left-color: var(--accent);
    background: rgba(0,229,255,0.05);
  }

  .sidebar-section-roman {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 28px;
    font-weight: 700;
  }

  .sidebar-section-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
  }

  .sidebar-section-arrow {
    font-size: 16px;
    color: var(--text-muted);
    transition: transform 0.2s;
    display: inline-block;
  }
  .sidebar-section-arrow.open { transform: rotate(90deg); }

  .sidebar-chapter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px 8px 24px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar-chapter-item:hover { background: var(--surface2); }
  .sidebar-chapter-item.active {
    border-left-color: var(--gold);
    background: rgba(255,209,102,0.06);
  }

  .sidebar-chapter-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 22px;
  }
  .sidebar-chapter-item.active .sidebar-chapter-num { color: var(--gold); }

  .sidebar-chapter-name {
    flex: 1;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.3;
  }
  .sidebar-chapter-item.active .sidebar-chapter-name { color: var(--gold); font-weight: 500; }


  /* List page button */
  .list-btn {
    margin-top: 12px;
    padding: 9px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .list-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Full-screen list page */
  .list-page {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
  }
  .list-page.open { display: flex; }

  .list-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .list-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .list-back-btn {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .list-back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .list-page-logo {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent);
    opacity: 0.7;
  }

  .list-page-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .list-search {
    flex: 1;
    min-width: 180px;
    padding: 9px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .list-search:focus { border-color: var(--accent); }
  .list-search::placeholder { color: var(--text-muted); }

  .list-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left sidebar for sections/chapters */
  .list-sidebar {
    width: 200px;
    flex-shrink: 0;

// ===================== STATE =====================
let state = {
  mode: 'flashcard',
  currentIndex: 0,
  flipped: false,
  answered: false,
  correct: 0,
  wrong: 0,
  streak: 0,
  total: 0,
  selectedSection: 'Tümü',
  selectedChapter: null,
  openSection: null,
  filteredData: [...gtipData],
  sessionAnswered: new Set(),
};

// ===================== CATEGORIES =====================
const SECTION_ORDER = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];

function getSectionName(sec) {
  const names = {
    'I': 'Canlı Hayvanlar & Gıda',
    'II': 'Bitkisel Ürünler',
    'III': 'Hayvansal/Bitkisel Yağlar',
    'IV': 'Gıda, İçecek, Tütün',
    'V': 'Mineral Ürünler',
    'VI': 'Kimya Ürünleri',
    'VII': 'Plastik & Kauçuk',
    'VIII': 'Deri & Kürk',
    'IX': 'Ahşap & Mantar',
    'X': 'Kağıt & Karton',
    'XI': 'Tekstil & Konfeksiyon',
    'XII': 'Ayakkabı & Şapka',
    'XIII': 'Taş, Çimento, Cam',
    'XIV': 'Değerli Taşlar & Metaller',
    'XV': 'Demir, Çelik & Metaller',
    'XVI': 'Makine & Elektronik',
    'XVII': 'Taşıtlar',
    'XVIII': 'Optik & Saat',
    'XIX': 'Silahlar',
    'XX': 'Çeşitli Eşyalar',
    'XXI': 'Sanat & Antika'
  };
  return names[sec] || 'Bölüm ' + sec;
}

function getChaptersForSection(sec) {
  const chapters = {};
  gtipData.filter(d => d.section === sec).forEach(d => {
    if (!chapters[d.chapter]) chapters[d.chapter] = d.chapter_name;
  });
  return chapters;
}

function renderCategories() {
  const list = document.getElementById('sidebar-list');
  let html = '';

  // "Tümü" item
  const totalCount = gtipData.length;
  html += `<div class="sidebar-item sidebar-all ${state.selectedSection === 'Tümü' ? 'active' : ''}" onclick="selectSection('Tümü')">
    <span class="sidebar-item-name">📦 Tüm Pozisyonlar</span>
    <span class="sidebar-item-count">${totalCount}</span>
  </div>`;

  // Sections
  SECTION_ORDER.forEach(sec => {
    const secItems = gtipData.filter(d => d.section === sec);
    if (secItems.length === 0) return;
    const isSecOpen = state.openSection === sec;
    const isSecActive = state.selectedSection === sec && !state.selectedChapter;

    html += `<div class="sidebar-section-header ${isSecActive ? 'active' : ''}" onclick="toggleSection('${sec}')">
      <span class="sidebar-section-roman">${sec}</span>
      <span class="sidebar-section-name">${getSectionName(sec)}</span>
      <span class="sidebar-section-arrow ${isSecOpen ? 'open' : ''}">›</span>
    </div>`;

    if (isSecOpen) {
      const chapters = getChaptersForSection(sec);
      Object.entries(chapters).forEach(([chap, chapName]) => {
        const count = gtipData.filter(d => d.chapter === chap).length;
        const isActive = state.selectedChapter === chap;
        html += `<div class="sidebar-chapter-item ${isActive ? 'active' : ''}" onclick="selectChapter('${chap}')">
          <span class="sidebar-chapter-num">${chap}</span>
          <span class="sidebar-chapter-name">${chapName}</span>
          <span class="sidebar-item-count">${count}</span>
        </div>`;
      });
    }
  });

  list.innerHTML = html;

  // Update toggle label
  const lbl = document.getElementById('sidebar-toggle-label');
  if (lbl) {
    if (state.selectedChapter) {
      lbl.textContent = 'Fasıl ' + state.selectedChapter;
    } else if (state.selectedSection !== 'Tümü') {
      lbl.textContent = 'Bölüm ' + state.selectedSection;
    } else {
      lbl.textContent = 'Tüm Pozisyonlar';
    }
  }
}

function toggleSection(sec) {
  state.openSection = state.openSection === sec ? null : sec;
  renderCategories();
}

function selectSection(sec) {
  state.selectedSection = sec;
  state.selectedChapter = null;
  state.filteredData = sec === 'Tümü' ? [...gtipData] : gtipData.filter(d => d.section === sec);
  state.filteredData = shuffle(state.filteredData);
  state.currentIndex = 0;
  state.answered = false;
  state.flipped = false;
  renderCategories();
  closeSidebar();
  render();
}

function selectChapter(chap) {
  state.selectedChapter = chap;
  state.selectedSection = gtipData.find(d => d.chapter === chap)?.section || 'Tümü';
  state.filteredData = shuffle(gtipData.filter(d => d.chapter === chap));
  state.currentIndex = 0;
  state.answered = false;
  state.flipped = false;
  renderCategories();
  closeSidebar();
  render();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// selectCategory replaced by selectSection and selectChapter

// ===================== SHUFFLE =====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===================== RENDER =====================
function render() {
  updateStats();
  updateProgress();

  const area = document.getElementById('card-area');
  const actionRow = document.getElementById('action-row');

  if (state.filteredData.length === 0) {
    area.innerHTML = '<div style="text-align:center;color:var(--text-muted)">Bu kategoride kart bulunamadı.</div>';
    return;
  }

  if (state.currentIndex >= state.filteredData.length) {
    showResult();
    return;
  }

  const item = state.filteredData[state.currentIndex];

  if (state.mode === 'flashcard') {
    renderFlashcard(item, area, actionRow);
  } else if (state.mode === 'multiple') {
    renderMultiple(item, area, actionRow);
  } else if (state.mode === 'truefalse') {
    renderTrueFalse(item, area, actionRow);
  }
}

function renderFlashcard(item, area, actionRow) {
  area.innerHTML = `
    <div class="flashcard-wrap">
      <div class="flashcard" id="fc" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-tag tag-code">GTİP KODU</span>
          <div class="card-code">${item.code}</div>
          <div class="card-chapter">Fasıl ${item.chapter} · ${item.section}</div>
          <div class="card-hint">
            <svg class="flip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            Kartı çevirmek için dokun
          </div>
        </div>
        <div class="card-face card-back">
          <span class="card-tag tag-desc">AÇIKLAMA</span>
          <div class="card-description">${item.desc}</div>
          <div class="card-chapter" style="margin-top:12px">Fasıl ${item.chapter} · ${item.section}</div>
        </div>
      </div>
    </div>
    <div class="self-rate ${state.flipped ? '' : 'hidden'}" id="self-rate">
      <button class="rate-btn didnt" onclick="rateCard(false)">✗ Bilmedim</button>
      <button class="rate-btn knew" onclick="rateCard(true)">✓ Bildim</button>
    </div>
  `;

  if (state.flipped) {
    document.getElementById('fc')?.classList.add('flipped');
  }

  actionRow.innerHTML = `
    <button class="btn-secondary" onclick="prevCard()">←</button>
    <button class="btn-primary" onclick="nextCard()">Sonraki →</button>
  `;
}

function flipCard() {
  state.flipped = !state.flipped;
  const fc = document.getElementById('fc');
  fc?.classList.toggle('flipped');
  const sr = document.getElementById('self-rate');
  if (sr) sr.classList.toggle('hidden', !state.flipped);
}

function rateCard(knew) {
  state.total++;
  if (knew) {
    state.correct++;
    state.streak++;
  } else {
    state.wrong++;
    state.streak = 0;
  }
  updateStats();
  state.flipped = false;
  state.currentIndex++;
  render();
}

function renderMultiple(item, area, actionRow) {
  // Generate 3 wrong options — önce aynı fasıl, sonra aynı bölüm, sonra rastgele
  const sameChapter = shuffle(gtipData.filter(d => d.code !== item.code && d.chapter === item.chapter));
  const sameSection = shuffle(gtipData.filter(d => d.code !== item.code && d.section === item.section && d.chapter !== item.chapter));
  const rest = shuffle(gtipData.filter(d => d.code !== item.code && d.section !== item.section));
  const pool = [...sameChapter, ...sameSection, ...rest];
  const others = pool.slice(0, 3);
  const options = shuffle([item, ...others]);

  area.innerHTML = `
    <div class="question-card" id="q-card">
      <span class="q-type-badge">Çoktan Seçmeli</span>
      <div class="q-text">Bu GTİP koduna karşılık gelen ürün hangisidir?</div>
      <div class="q-code-display">${item.code}</div>
      <div class="options" id="opts" style="margin-top:16px">
        ${options.map((opt, i) => `
          <button class="option-btn" id="opt-${i}" onclick="selectOption(${i}, '${opt.code}', '${item.code}')">
            <span class="option-letter">${['A','B','C','D'][i]}</span>
            <span>${opt.desc}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation-box" id="exp-box">
        ✓ Doğru cevap: <strong>${item.desc}</strong> — GTİP ${item.code}
      </div>
    </div>
  `;

  actionRow.innerHTML = `
    <button class="btn-secondary" onclick="prevCard()">←</button>
    <button class="btn-primary" id="next-btn" onclick="nextCard()" style="display:none">Sonraki →</button>
  `;
}

function selectOption(idx, selectedCode, correctCode) {
  if (state.answered) return;
  state.answered = true;
  state.total++;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    const opt = btn.querySelector('span:last-child');
    // find which button has correct desc
  });

  // Mark correct/wrong
  const correct = selectedCode === correctCode;
  if (correct) {
    state.correct++;
    state.streak++;
    document.getElementById(`opt-${idx}`).classList.add('correct-ans');
  } else {
    state.wrong++;
    state.streak = 0;
    document.getElementById(`opt-${idx}`).classList.add('wrong-ans');
    // find and highlight correct
    buttons.forEach((btn, i) => {
      if (btn.querySelector('span:last-child').textContent === state.filteredData[state.currentIndex].desc) {
        btn.classList.add('correct-ans');
      }
    });
  }

  document.getElementById('exp-box')?.classList.add('show');
  document.getElementById('next-btn').style.display = 'block';
  updateStats();
}

function renderTrueFalse(item, area, actionRow) {
  // 50% chance: show correct pair, 50% show wrong pair
  const showCorrect = Math.random() > 0.5;
  let displayDesc;
  let isCorrect;

  if (showCorrect) {
    displayDesc = item.desc;
    isCorrect = true;
  } else {
    const sameChapter = shuffle(gtipData.filter(d => d.code !== item.code && d.chapter === item.chapter));
    const sameSection = shuffle(gtipData.filter(d => d.code !== item.code && d.section === item.section && d.chapter !== item.chapter));
    const rest = shuffle(gtipData.filter(d => d.code !== item.code && d.section !== item.section));
    const pool = [...sameChapter, ...sameSection, ...rest];
    displayDesc = pool[0].desc;
    isCorrect = false;
  }

  area.innerHTML = `
    <div class="question-card" id="q-card">
      <span class="q-type-badge">Doğru / Yanlış</span>
      <div class="q-text">Bu GTİP kodu ve ürün eşleşmesi doğru mu?</div>
      <div class="q-code-display">${item.code}</div>
      <div style="font-size:15px;color:var(--text);margin:8px 0 4px;font-weight:500">"${displayDesc}"</div>
      <div class="card-chapter">Fasıl ${item.chapter} · ${item.section}</div>
      <div class="tf-options">
        <button class="tf-btn true-btn" id="tf-true" onclick="answerTF(true, ${isCorrect})">✓ Doğru</button>
        <button class="tf-btn false-btn" id="tf-false" onclick="answerTF(false, ${isCorrect})">✗ Yanlış</button>
      </div>
      <div class="explanation-box" id="exp-box">
        ${isCorrect ? `✓ Doğru eşleşme! GTİP ${item.code} = ${item.desc}` : `✗ Yanlış eşleşme! GTİP ${item.code} aslında "${item.desc}" ürününe karşılık gelir.`}
      </div>
    </div>
  `;

  actionRow.innerHTML = `
    <button class="btn-secondary" onclick="prevCard()">←</button>
    <button class="btn-primary" id="next-btn" onclick="nextCard()" style="display:none">Sonraki →</button>
  `;
}

function answerTF(userSaidTrue, actuallyTrue) {
  if (state.answered) return;
  state.answered = true;
  state.total++;

  const correct = (userSaidTrue === actuallyTrue);
  if (correct) {
    state.correct++;
    state.streak++;
  } else {
    state.wrong++;
    state.streak = 0;
  }

  const trueBtn = document.getElementById('tf-true');
  const falseBtn = document.getElementById('tf-false');
  trueBtn.disabled = true;
  falseBtn.disabled = true;

  if (actuallyTrue) {
    trueBtn.classList.add('correct-ans');
    if (!userSaidTrue) falseBtn.classList.add('wrong-ans');
  } else {
    falseBtn.classList.add('correct-ans');
    if (userSaidTrue) trueBtn.classList.add('wrong-ans');
  }

  document.getElementById('exp-box')?.classList.add('show');
  document.getElementById('next-btn').style.display = 'block';
  updateStats();
}

// ===================== NAVIGATION =====================
function nextCard() {
  state.answered = false;
  state.flipped = false;
  state.currentIndex++;
  render();
}

function prevCard() {
  if (state.currentIndex > 0) {
    state.answered = false;
    state.flipped = false;
    state.currentIndex--;
    render();
  }
}

// ===================== MODE SWITCH =====================
function switchMode(mode) {
  state.mode = mode;
  state.currentIndex = 0;
  state.answered = false;
  state.flipped = false;

  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.toggle('active', ['flashcard','multiple','truefalse'][i] === mode);
  });

  render();
}

// ===================== STATS =====================
function updateStats() {
  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-wrong').textContent = state.wrong;
  document.getElementById('stat-streak').textContent = state.streak;
  document.getElementById('stat-total').textContent = state.total;
}

function updateProgress() {
  const total = state.filteredData.length;
  const current = Math.min(state.currentIndex, total);
  const pct = total > 0 ? (current / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${current} / ${total}`;
}

// ===================== RESULT =====================
function showResult() {
  const area = document.getElementById('card-area');
  const pct = state.total > 0 ? Math.round((state.correct / state.total) * 100) : 0;
  let emoji = '🎉';
  let msg = 'Harika iş!';
  if (pct < 50) { emoji = '💪'; msg = 'Pratik yapmaya devam et!'; }
  else if (pct < 75) { emoji = '👍'; msg = 'İyi gidiyorsun!'; }

  area.innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${msg}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-detail">${state.correct} doğru · ${state.wrong} yanlış · ${state.total} toplam</div>
      <button class="btn-primary" style="max-width:240px;margin:0 auto;" onclick="resetSession()">
        Tekrar Başla
      </button>
    </div>
  `;

  document.getElementById('action-row').innerHTML = '';
}

function resetSession() {
  state.currentIndex = 0;
  state.correct = 0;
  state.wrong = 0;
  state.streak = 0;
  state.total = 0;
  state.answered = false;
  state.flipped = false;
  state.filteredData = shuffle([...state.filteredData]);
  render();
}

// ===================== INIT =====================
state.filteredData = shuffle([...gtipData]);
renderCategories();
render();

// ===================== LIST PAGE =====================
let listState = {
  activeChapter: null,
  searchQuery: '',
};

function openListPage() {
  document.getElementById('list-page').classList.add('open');
  if (!listState.activeChapter) {
    // Default: first chapter
    const firstChapter = gtipData[0]?.chapter;
    listState.activeChapter = firstChapter;
  }
  renderListSidebar();
  renderListContent();
}

function closeListPage() {
  document.getElementById('list-page').classList.remove('open');
}

function filterList() {
  listState.searchQuery = document.getElementById('list-search').value.trim().toLowerCase();
  listState.activeChapter = listState.searchQuery ? null : listState.activeChapter;
  renderListSidebar();
  renderListContent();
}

function renderListSidebar() {
  const el = document.getElementById('list-sidebar');
  if (listState.searchQuery) {
    el.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-muted)">Arama sonuçları</div>';
    return;
  }

  let html = '';
  const sections = {};
  gtipData.forEach(d => {
    if (!sections[d.section]) sections[d.section] = {};
    sections[d.section][d.chapter] = d.chapter_name;
  });

  SECTION_ORDER.forEach(sec => {
    if (!sections[sec]) return;
    html += `<div class="ls-section">Bölüm ${sec}</div>`;
    Object.entries(sections[sec]).forEach(([chap, name]) => {
      html += `<div class="ls-chapter ${listState.activeChapter === chap ? 'active' : ''}" onclick="selectListChapter('${chap}')">
        <span class="ls-chapter-num">${chap}</span>
        <span class="ls-chapter-name">${name}</span>
      </div>`;
    });
  });

  el.innerHTML = html;

  // Scroll active into view
  setTimeout(() => {
    const active = el.querySelector('.ls-chapter.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }, 50);
}

function selectListChapter(chap) {
  listState.activeChapter = chap;
  listState.searchQuery = '';
  document.getElementById('list-search').value = '';
  renderListSidebar();
  renderListContent();
}

function renderListContent() {
  const el = document.getElementById('list-content');
  let items;

  if (listState.searchQuery) {
    const q = listState.searchQuery;
    items = gtipData.filter(d => d.code.includes(q) || d.desc.toLowerCase().includes(q) || d.chapter_name.toLowerCase().includes(q));
    if (items.length === 0) {
      el.innerHTML = '<div class="lc-empty">🔍 Sonuç bulunamadı</div>';
      return;
    }
    // Group by chapter for search results
    const byChapter = {};
    items.forEach(d => {
      if (!byChapter[d.chapter]) byChapter[d.chapter] = { name: d.chapter_name, items: [] };
      byChapter[d.chapter].items.push(d);
    });
    let html = '';
    Object.entries(byChapter).forEach(([chap, group]) => {
      html += `<div class="lc-chapter-title">
        <div class="lc-chapter-badge">FASIL ${chap}</div>
        <div class="lc-chapter-name">${group.name}</div>
      </div>`;
      group.items.forEach(d => {
        const codeHL = d.code.replace(new RegExp(listState.searchQuery, 'gi'), m => `<mark style="background:rgba(0,229,255,0.2);color:var(--accent);border-radius:2px">${m}</mark>`);
        const descHL = d.desc.replace(new RegExp(listState.searchQuery, 'gi'), m => `<mark style="background:rgba(0,229,255,0.2);color:var(--accent);border-radius:2px">${m}</mark>`);
        html += `<div class="lc-row">
          <span class="lc-code">${codeHL}</span>
          <span class="lc-desc">${descHL}</span>
        </div>`;
      });
    });
    el.innerHTML = html;
    return;
  }

  if (!listState.activeChapter) {
    el.innerHTML = '<div class="lc-empty">Sol taraftan bir fasıl seçin</div>';
    return;
  }

  items = gtipData.filter(d => d.chapter === listState.activeChapter);
  const chapName = items[0]?.chapter_name || '';

  let html = `<div class="lc-chapter-title">
    <div class="lc-chapter-badge">FASIL ${listState.activeChapter}</div>
    <div class="lc-chapter-name">${chapName}</div>
  </div>`;

  items.forEach(d => {
    html += `<div class="lc-row">
      <span class="lc-code">${d.code}</span>
      <span class="lc-desc">${d.desc}</span>
    </div>`;
  });

  el.innerHTML = html;
  el.scrollTop = 0;
}

// Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner')?.classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner')?.classList.remove('show');
    });
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner')?.classList.remove('show');
});
